services:
  - type: web
    name: buildify-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ALLOWED_ORIGINS
        value: https://buildify-six.vercel.app
      - key: HOUSEGAN_HF_URL
        value: https://buildify-housegan.hf.space/api/predict
